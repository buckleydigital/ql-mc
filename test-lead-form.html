<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Lead Form</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 60px auto; padding: 0 20px; }
    h2 { margin-bottom: 24px; }
    label { display: block; margin-bottom: 4px; font-size: 14px; font-weight: 600; }
    input, select, textarea { width: 100%; padding: 10px; margin-bottom: 16px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
    textarea { font-family: monospace; font-size: 12px; resize: vertical; }
    .hint { font-size: 11px; color: #888; margin-top: -12px; margin-bottom: 14px; }
    button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 16px; padding: 12px; border-radius: 6px; display: none; font-size: 14px; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #991b1b; }
    hr { border: none; border-top: 1px solid #e5e5e5; margin: 8px 0 20px; }
    .section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #6b7280; margin-bottom: 12px; }
  </style>
</head>
<body>
  <h2>Test Lead Submission</h2>

  <form id="leadForm">
    <p class="section-title">Your Account</p>
    <label>Email</label>
    <input type="email" name="login_email" placeholder="you@example.com" required>
    <label>Password</label>
    <input type="password" name="login_password" placeholder="Dashboard password" required>

    <hr>

    <p class="section-title">Lead Data</p>
    <label>Full Name</label>
    <input type="text" name="name" value="Jane Test" required>

    <label>Email</label>
    <input type="email" name="email" value="jane@test.com" required>

    <label>Phone</label>
    <input type="tel" name="phone" value="0444444444" required>

    <label>Postcode</label>
    <input type="text" name="postcode" value="4218" required>

    <label>Homeowner?</label>
    <select name="is_homeowner">
      <option value="true">Yes</option>
      <option value="false">No</option>
    </select>

    <label>Avg Quarterly Bill ($)</label>
    <input type="number" name="avg_quarterly_bill" value="320" required>

    <label>Interested In</label>
    <select name="interested_in">
      <option value="solar">Solar</option>
      <option value="battery">Battery</option>
      <option value="both">Solar + Battery</option>
    </select>

    <label>Purchase Timeline</label>
    <select name="purchase_timeline">
      <option value="0-3 months">0–3 months</option>
      <option value="3-6 months" selected>3–6 months</option>
      <option value="6-12 months">6–12 months</option>
      <option value="12+ months">12+ months</option>
    </select>

    <hr>

    <label>Custom Fields <span style="font-weight:400;color:#888">(optional JSON)</span></label>
    <textarea name="custom_data" rows="4" placeholder='{"roof_condition":"Good","shading_notes":"West side only"}'></textarea>
    <p class="hint">Any extra key/value pairs here are captured in custom_data and will auto-appear in lead delivery emails.</p>

    <button type="submit">Send Lead</button>
  </form>

  <div id="status"></div>

  <script>
    const SUPABASE_URL = 'https://wmegoygrancfwxagqskh.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_UHQNxVCjHJnFjssYwTiwcQ_3FYovX8I';

    document.getElementById('leadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = e.target;
      const status = document.getElementById('status');
      const btn = form.querySelector('button');

      // Parse custom_data JSON if provided
      let customData = {};
      const rawCustom = form.custom_data.value.trim();
      if (rawCustom) {
        try {
          customData = JSON.parse(rawCustom);
        } catch {
          status.className = 'error';
          status.textContent = 'Custom Fields must be valid JSON (or leave blank).';
          status.style.display = 'block';
          return;
        }
      }

      btn.textContent = 'Signing in...';
      btn.disabled = true;
      status.style.display = 'none';

      try {
        // Step 1: authenticate with Supabase to get a JWT
        const authRes = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({
            email: form.login_email.value,
            password: form.login_password.value,
          }),
        });
        const authData = await authRes.json();
        if (!authRes.ok) {
          throw new Error(authData.error_description || authData.message || 'Login failed');
        }
        const jwt = authData.access_token;

        // Step 2: submit lead via edge function — webhook URL and token stay server-side
        btn.textContent = 'Sending lead...';
        const leadData = {
          name: form.name.value,
          email: form.email.value,
          phone: form.phone.value,
          postcode: form.postcode.value,
          is_homeowner: form.is_homeowner.value === 'true',
          avg_quarterly_bill: Number(form.avg_quarterly_bill.value),
          interested_in: form.interested_in.value,
          purchase_timeline: form.purchase_timeline.value,
          custom_data: customData,
        };

        const res = await fetch(`${SUPABASE_URL}/functions/v1/submit-lead`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${jwt}`,
          },
          body: JSON.stringify(leadData),
        });
        const result = await res.json();
        if (!res.ok) throw new Error(result.error || `HTTP ${res.status}`);

        status.className = 'success';
        status.textContent = `Lead sent! Response: ${result.response}`;
      } catch (err) {
        status.className = 'error';
        status.textContent = `Error: ${err.message}`;
      } finally {
        status.style.display = 'block';
        btn.textContent = 'Send Lead';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
