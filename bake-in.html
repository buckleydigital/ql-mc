<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuoteLeads HQ</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #030a03; font-family: 'Press Start 2P', monospace; min-height: 100vh; padding: 16px; overflow-x: hidden; color: #fff; }
  ::-webkit-scrollbar { width: 3px; background: #030a03; }
  ::-webkit-scrollbar-thumb { background: #4ade8033; }

  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes idle { 0%,100%{transform:translateY(0) rotate(0deg)} 33%{transform:translateY(-1px) rotate(-2deg)} 66%{transform:translateY(-1px) rotate(2deg)} }
  @keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.7)} }
  @keyframes scan { 0%{transform:translateY(-100%)} 100%{transform:translateY(100vh)} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #crt-scan { position: fixed; top: 0; left: 0; right: 0; height: 50px; background: linear-gradient(transparent, rgba(74,222,128,0.035), transparent); animation: scan 5s linear infinite; pointer-events: none; z-index: 999; }

  #header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #4ade8022; padding-bottom: 14px; margin-bottom: 14px; }
  #header-title { font-size: 11px; color: #4ade80; text-shadow: 0 0 16px #4ade80; letter-spacing: 2px; }
  #header-sub { font-size: 5px; color: #4ade8055; margin-top: 4px; letter-spacing: 1px; }
  #header-time { font-size: 7px; color: #4ade80; text-align: right; }
  #header-agents { font-size: 5px; color: #4ade8044; margin-top: 4px; text-align: right; }
  #blink { animation: blink 1s infinite; display: inline-block; margin-left: 4px; }

  #stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; margin-bottom: 14px; }
  .stat-card { background: #070f07; padding: 7px 8px; text-align: center; border: 1px solid transparent; }
  .stat-label { font-size: 4.5px; margin-bottom: 3px; letter-spacing: 1px; opacity: 0.6; }
  .stat-value { font-size: 9px; }

  #tabs { display: flex; gap: 6px; margin-bottom: 14px; }
  .tab-btn { font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 6px 10px; cursor: pointer; border: none; letter-spacing: 0.5px; transition: all 0.2s; }
  .tab-btn.active { background: #4ade80; color: #030a03; }
  .tab-btn.inactive { background: #070f07; color: #4ade8088; border-bottom: 2px solid #4ade8033; }

  #rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .room { position: relative; padding: 10px 12px; min-height: 155px; overflow: hidden; border: 2px solid transparent; }
  .room-grid-bg { position: absolute; inset: 0; pointer-events: none; background-size: 18px 18px; }
  .room-scanlines { position: absolute; inset: 0; pointer-events: none; z-index: 8; background-image: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.07) 2px,rgba(0,0,0,0.07) 4px); }
  .room-header { display: flex; justify-content: space-between; margin-bottom: 8px; position: relative; z-index: 2; }
  .room-name { font-size: 6.5px; letter-spacing: 0.5px; }
  .room-count { font-size: 5px; opacity: 0.4; }
  .room-agents { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; padding-top: 4px; position: relative; z-index: 2; }

  .agent-wrap { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; position: relative; transition: transform 0.4s ease; }
  .agent-sprite { width: 26px; height: 39px; position: relative; }
  .agent-sprite.busy { animation: bob 0.7s ease-in-out infinite; }
  .agent-sprite.idle-anim { animation: idle 2.5s ease-in-out infinite; }

  .sprite-head { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 15px; height: 15px; background: #f5c6a0; border: 2px solid #111; }
  .sprite-eye-l, .sprite-eye-r { position: absolute; top: 4px; width: 2px; height: 2px; background: #111; }
  .sprite-eye-l { left: 3px; }
  .sprite-eye-r { right: 3px; }
  .sprite-body { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); width: 18px; height: 13px; border: 2px solid #111; }
  .sprite-arms { position: absolute; top: 16px; left: 50%; transform: translateX(-50%); width: 25px; height: 4px; border: 2px solid #111; }
  .sprite-legs { position: absolute; top: 29px; left: 50%; transform: translateX(-50%); display: flex; gap: 2px; }
  .sprite-leg { width: 6px; height: 9px; background: #1e293b; border: 2px solid #111; transition: transform 0.18s; }
  .sprite-leg.l.walking { animation: leg-l 0.35s steps(1) infinite; }
  .sprite-leg.r.walking { animation: leg-r 0.35s steps(1) infinite; }
  @keyframes leg-l { 0%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
  @keyframes leg-r { 0%{transform:rotate(10deg)} 50%{transform:rotate(-10deg)} }

  .sprite-status { position: absolute; top: -3px; right: -3px; width: 7px; height: 7px; border: 1px solid #000; z-index: 5; }
  .sprite-status.online { background: #22c55e; animation: pulse-dot 1s infinite; }
  .sprite-status.offline { background: #ef4444; }

  .agent-name { font-size: 5.5px; text-align: center; max-width: 52px; line-height: 1.3; }
  .agent-role { font-size: 4px; color: #ffffff44; text-align: center; }

  .agent-tooltip { display: none; position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%); background: #0a1a0a; padding: 4px 6px; font-size: 5px; white-space: nowrap; z-index: 20; border: 1px solid transparent; }
  .agent-wrap:hover .agent-tooltip { display: block; }

  #workflows { display: none; }
  #workflows.active { display: block; }
  #rooms-grid-wrap { display: block; }
  #rooms-grid-wrap.hidden { display: none; }

  .workflow-header { font-size: 6px; color: #4ade8066; margin-bottom: 12px; letter-spacing: 1px; }
  .workflows-list { display: flex; flex-direction: column; gap: 8px; }
  .workflow-item { background: #070f07; padding: 10px 12px; display: flex; justify-content: space-between; align-items: center; }
  .workflow-left { display: flex; align-items: center; gap: 10px; }
  .workflow-icon { font-size: 14px; }
  .workflow-name { font-size: 6.5px; margin-bottom: 3px; }
  .workflow-tool { font-size: 5px; color: #ffffff44; }
  .workflow-tag { font-size: 5px; padding: 3px 6px; }
  .workflow-tip { margin-top: 14px; font-size: 5px; color: #4ade8033; border-top: 1px solid #4ade8011; padding-top: 10px; line-height: 2; }

  #footer { margin-top: 14px; text-align: center; font-size: 4.5px; color: #4ade8022; letter-spacing: 2px; }
</style>
</head>
<body>

<div id="crt-scan"></div>

<div id="header">
  <div>
    <div id="header-title">◆ QUOTELEADS HQ</div>
    <div id="header-sub">AI AGENT FLEET · LIVE DASHBOARD</div>
  </div>
  <div>
    <div id="header-time"><span id="clock">00:00:00</span><span id="blink">●</span></div>
    <div id="header-agents">-- / -- ACTIVE</div>
  </div>
</div>

<div id="stats">
  <div class="stat-card" style="border-color:#4ade8033">
    <div class="stat-label" style="color:#4ade80">MRR</div>
    <div class="stat-value" id="stat-mrr" style="color:#4ade80;text-shadow:0 0 10px #4ade80">$0</div>
  </div>
  <div class="stat-card" style="border-color:#f472b833">
    <div class="stat-label" style="color:#f472b8">LEADS</div>
    <div class="stat-value" id="stat-leads" style="color:#f472b8;text-shadow:0 0 10px #f472b8">0</div>
  </div>
  <div class="stat-card" style="border-color:#a78bfa33">
    <div class="stat-label" style="color:#a78bfa">AGENTS</div>
    <div class="stat-value" id="stat-agents" style="color:#a78bfa;text-shadow:0 0 10px #a78bfa">--/--</div>
  </div>
  <div class="stat-card" style="border-color:#38bdf833">
    <div class="stat-label" style="color:#38bdf8">CLIENTS</div>
    <div class="stat-value" id="stat-clients" style="color:#38bdf8;text-shadow:0 0 10px #38bdf8">0</div>
  </div>
</div>

<div id="tabs">
  <button class="tab-btn active" id="tab-hq" onclick="switchTab('hq')">🏰 HQ MAP</button>
  <button class="tab-btn inactive" id="tab-make" onclick="switchTab('make')">⚡ MAKE WORKFLOWS</button>
</div>

<div id="rooms-grid-wrap">
  <div id="rooms-grid"></div>
</div>

<div id="workflows">
  <div class="workflow-header">CONNECT THESE IN MAKE.COM → POWER YOUR AGENTS</div>
  <div class="workflows-list" id="workflows-list"></div>
  <div class="workflow-tip">TIP: START WITH LEAD ENGINE WORKFLOWS FIRST → THEN RETENTION → THEN SALES</div>
</div>

<div id="footer">QUOTELEADS · ALL SYSTEMS OPERATIONAL · AU</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_KEY = 'YOUR_SUPABASE_ANON_KEY';
let sbClient = null;

// ─── STATIC AGENTS ─────────────────────────────────────────────────────────
const ROOMS = [
  {
    name: '🏢 SALES',
    bg: '#070f07', border: '#4ade80', label: '#4ade80',
    agents: [
      { id: 'prospector-001', name: 'Prospector', role: 'Outbound', color: '#4ade80', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'qualifier-001', name: 'Qualifier', role: 'Inbound', color: '#a78bfa', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'closer-001', name: 'Closer', role: 'Proposals', color: '#fb923c', busy: false, stat: 'Waiting for Supabase...' },
    ]
  },
  {
    name: '⚙️ DELIVERY',
    bg: '#070a14', border: '#38bdf8', label: '#60a5fa',
    agents: [
      { id: 'builder-001', name: 'Builder', role: 'Onboarding', color: '#38bdf8', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'adbot-001', name: 'Adbot', role: 'Meta/Google', color: '#facc15', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'landingpg-001', name: 'LandingPg', role: 'Pages', color: '#4ade80', busy: false, stat: 'Waiting for Supabase...' },
    ]
  },
  {
    name: '📲 LEAD ENGINE',
    bg: '#140714', border: '#f472b6', label: '#f472b6',
    agents: [
      { id: 'smsagent-001', name: 'SMSAgent', role: 'Respond', color: '#f472b6', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'voicebot-001', name: 'VoiceBot', role: 'Calls', color: '#fb923c', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'quoter-001', name: 'Quoter', role: 'Quotes', color: '#4ade80', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'chaser-001', name: 'Chaser', role: 'Follow-up', color: '#a78bfa', busy: false, stat: 'Waiting for Supabase...' },
    ]
  },
  {
    name: '🛡️ RETENTION',
    bg: '#071410', border: '#34d399', label: '#34d399',
    agents: [
      { id: 'pulsecheck-001', name: 'PulseCheck', role: 'Health', color: '#34d399', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'churnbot-001', name: 'ChurnBot', role: 'At-risk', color: '#f87171', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'reporter-001', name: 'Reporter', role: 'Reports', color: '#60a5fa', busy: false, stat: 'Waiting for Supabase...' },
    ]
  },
  {
    name: '🧠 OPS',
    bg: '#0f0714', border: '#a78bfa', label: '#a78bfa',
    agents: [
      { id: 'inbox-001', name: 'Inbox', role: 'Comms', color: '#facc15', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'bookkeeper-001', name: 'Bookkeeper', role: 'Finance', color: '#a78bfa', busy: false, stat: 'Waiting for Supabase...' },
      { id: 'datasyncer-001', name: 'DataSyncer', role: 'CRM', color: '#38bdf8', busy: false, stat: 'Waiting for Supabase...' },
    ]
  }
];

const WORKFLOWS = [
  { icon: '📥', name: 'New Lead → SMS in 60s', tool: 'Make + Twilio', room: 'LEAD ENGINE', color: '#f472b6' },
  { icon: '🎙️', name: 'Lead → Voice Call', tool: 'Make + Bland AI', room: 'LEAD ENGINE', color: '#fb923c' },
  { icon: '📄', name: 'Quote Drafter', tool: 'Make + Claude AI', room: 'LEAD ENGINE', color: '#4ade80' },
  { icon: '🔁', name: 'Day 2/5/10 Follow-up', tool: 'Make + CRM', room: 'LEAD ENGINE', color: '#a78bfa' },
  { icon: '🎯', name: 'Inbound Lead → CRM', tool: 'Make + GoHighLevel', room: 'SALES', color: '#4ade80' },
  { icon: '📊', name: 'Daily Client Reports', tool: 'Make + Gmail', room: 'OPS', color: '#60a5fa' },
  { icon: '⚠️', name: 'Churn Risk Alert', tool: 'Make + Slack', room: 'RETENTION', color: '#f87171' },
  { icon: '🏗️', name: 'New Client Onboarding', tool: 'Make + Notion', room: 'DELIVERY', color: '#38bdf8' },
];

// ─── RENDER ────────────────────────────────────────────────────────────────
function renderAgent(agent) {
  const wrap = document.createElement('div');
  wrap.className = 'agent-wrap';
  wrap.dataset.agentId = agent.id;

  const tip = document.createElement('div');
  tip.className = 'agent-tooltip';
  tip.style.borderColor = agent.color;
  tip.style.color = agent.color;
  tip.style.boxShadow = `0 0 10px ${agent.color}44`;
  tip.textContent = agent.stat;
  wrap.appendChild(tip);

  const sprite = document.createElement('div');
  sprite.className = `agent-sprite ${agent.busy ? 'busy' : 'idle-anim'}`;

  const dot = document.createElement('div');
  dot.className = `sprite-status ${agent.busy ? 'online' : 'offline'}`;
  sprite.appendChild(dot);

  const head = document.createElement('div');
  head.className = 'sprite-head';
  const eyeL = document.createElement('div'); eyeL.className = 'sprite-eye-l';
  const eyeR = document.createElement('div'); eyeR.className = 'sprite-eye-r';
  head.appendChild(eyeL); head.appendChild(eyeR);
  sprite.appendChild(head);

  const body = document.createElement('div');
  body.className = 'sprite-body';
  body.style.background = agent.color;
  sprite.appendChild(body);

  const arms = document.createElement('div');
  arms.className = 'sprite-arms';
  arms.style.background = agent.color;
  sprite.appendChild(arms);

  const legs = document.createElement('div');
  legs.className = 'sprite-legs';
  ['l', 'r'].forEach(side => {
    const leg = document.createElement('div');
    leg.className = `sprite-leg ${side}${agent.busy ? ' walking' : ''}`;
    legs.appendChild(leg);
  });
  sprite.appendChild(legs);

  wrap.appendChild(sprite);

  const name = document.createElement('div');
  name.className = 'agent-name';
  name.style.color = agent.color;
  name.style.textShadow = `0 0 6px ${agent.color}`;
  name.textContent = agent.name;
  wrap.appendChild(name);

  const role = document.createElement('div');
  role.className = 'agent-role';
  role.textContent = agent.role;
  wrap.appendChild(role);

  if (!agent.busy) {
    setInterval(() => {
      const x = (Math.random() - 0.5) * 5;
      const y = (Math.random() - 0.5) * 3;
      wrap.style.transform = `translate(${x}px,${y}px)`;
    }, 500 + Math.random() * 300);
  }

  return wrap;
}

function renderRoom(room) {
  const busyCount = room.agents.filter(a => a.busy).length;

  const el = document.createElement('div');
  el.className = 'room';
  el.style.background = room.bg;
  el.style.borderColor = room.border;
  el.style.boxShadow = `0 0 20px ${room.border}22, inset 0 0 40px rgba(0,0,0,0.6)`;

  const gridBg = document.createElement('div');
  gridBg.className = 'room-grid-bg';
  gridBg.style.backgroundImage = `linear-gradient(${room.border}0d 1px,transparent 1px),linear-gradient(90deg,${room.border}0d 1px,transparent 1px)`;
  el.appendChild(gridBg);

  const sl = document.createElement('div');
  sl.className = 'room-scanlines';
  el.appendChild(sl);

  const header = document.createElement('div');
  header.className = 'room-header';

  const rName = document.createElement('span');
  rName.className = 'room-name';
  rName.style.color = room.label;
  rName.style.textShadow = `0 0 8px ${room.label}`;
  rName.textContent = room.name;

  const rCount = document.createElement('span');
  rCount.className = 'room-count';
  rCount.style.color = room.label;
  rCount.textContent = `${busyCount}/${room.agents.length}`;

  header.appendChild(rName);
  header.appendChild(rCount);
  el.appendChild(header);

  const agentsWrap = document.createElement('div');
  agentsWrap.className = 'room-agents';
  room.agents.forEach(a => agentsWrap.appendChild(renderAgent(a)));
  el.appendChild(agentsWrap);

  return el;
}

function renderAll() {
  const grid = document.getElementById('rooms-grid');
  grid.innerHTML = '';
  ROOMS.forEach(r => grid.appendChild(renderRoom(r)));
}

function updateAgent(id, updates) {
  // Find agent in ROOMS
  for (const room of ROOMS) {
    const agent = room.agents.find(a => a.id === id);
    if (agent) {
      Object.assign(agent, updates);
      // Re-render just this agent's DOM
      const wrap = document.querySelector(`[data-agent-id="${id}"]`);
      if (wrap) {
        const parent = wrap.parentNode;
        const idx = room.agents.indexOf(agent);
        parent.replaceChild(renderAgent(agent), wrap);
      }
      return;
    }
  }
}

function updateStats() {
  let busy = 0, total = 0;
  ROOMS.forEach(r => {
    r.agents.forEach(a => {
      total++;
      if (a.busy) busy++;
    });
  });
  document.getElementById('stat-agents').textContent = `${busy}/${total}`;
  document.getElementById('header-agents').textContent = `${busy}/${total} ACTIVE`;
}

// ─── SUPABASE ──────────────────────────────────────────────────────────────
async function connectSupabase() {
  if (!window.supabase || SUPABASE_URL === 'YOUR_SUPABASE_URL') return;

  try {
    sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const { data: agents, error } = await sbClient.from('agents').select('*');
    if (error) throw error;

    // Overlay live data onto static agents
    if (agents && agents.length) {
      agents.forEach(live => {
        for (const room of ROOMS) {
          const agent = room.agents.find(a => a.id === live.id);
          if (agent) {
            agent.busy = live.busy || false;
            agent.stat = live.current_stat || live.current_task || 'Active';
            agent._live = true;
          }
        }
      });
      renderAll();
      updateStats();
    }

    // Realtime
    sbClient.channel('agents')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'agents' }, (payload) => {
        const live = payload.new;
        updateAgent(live.id, {
          busy: live.busy || false,
          stat: live.current_stat || live.current_task || 'Active',
          _live: true
        });
        updateStats();
      })
      .subscribe();

    // Stats
    loadStats();

  } catch (e) {
    console.log('Supabase offline:', e.message);
  }
}

async function loadStats() {
  if (!sbClient) return;
  try {
    const { data: mrrData } = await sbClient.from('clients').select('mrr');
    const mrr = mrrData?.reduce((sum, c) => sum + (c.mrr || 0), 0) || 0;
    document.getElementById('stat-mrr').textContent = `$${(mrr / 100).toLocaleString()}`;

    const { count: leadCount } = await sbClient.from('leads').select('*', { count: 'exact', head: true });
    document.getElementById('stat-leads').textContent = leadCount || 0;

    const { count: clientCount } = await sbClient.from('clients').select('*', { count: 'exact', head: true });
    document.getElementById('stat-clients').textContent = clientCount || 0;
  } catch (e) {
    console.log('Stats error:', e.message);
  }
}

// ─── TABS ───────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-hq').className = tab === 'hq' ? 'tab-btn active' : 'tab-btn inactive';
  document.getElementById('tab-make').className = tab === 'make' ? 'tab-btn active' : 'tab-btn inactive';
  document.getElementById('rooms-grid-wrap').classList.toggle('hidden', tab !== 'hq');
  document.getElementById('workflows').classList.toggle('active', tab === 'make');
}

// ─── CLOCK ──────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('en-AU', { hour12: false });
}

// ─── WORKFLOWS ──────────────────────────────────────────────────────────────
function buildWorkflows() {
  const list = document.getElementById('workflows-list');
  list.innerHTML = '';
  WORKFLOWS.forEach(w => {
    const item = document.createElement('div');
    item.className = 'workflow-item';
    item.style.borderLeft = `3px solid ${w.color}44`;
    item.style.boxShadow = `0 0 8px ${w.color}11`;

    const left = document.createElement('div');
    left.className = 'workflow-left';

    const icon = document.createElement('span');
    icon.className = 'workflow-icon';
    icon.textContent = w.icon;

    const info = document.createElement('div');
    const wName = document.createElement('div');
    wName.className = 'workflow-name';
    wName.style.color = w.color;
    wName.textContent = w.name;
    const wTool = document.createElement('div');
    wTool.className = 'workflow-tool';
    wTool.textContent = w.tool;
    info.appendChild(wName);
    info.appendChild(wTool);

    left.appendChild(icon);
    left.appendChild(info);

    const tag = document.createElement('div');
    tag.className = 'workflow-tag';
    tag.style.color = `${w.color}88`;
    tag.style.background = `${w.color}11`;
    tag.style.border = `1px solid ${w.color}33`;
    tag.textContent = w.room;

    item.appendChild(left);
    item.appendChild(tag);
    list.appendChild(item);
  });
}

// ─── INIT ───────────────────────────────────────────────────────────────────
renderAll();
updateStats();
buildWorkflows();
updateClock();
setInterval(updateClock, 1000);

// Try Supabase after render
setTimeout(connectSupabase, 100);
</script>
</body>
</html>
